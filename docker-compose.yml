services:
  simserver:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
    depends_on:
      - lgtm

  # All-in-one OpenTelemetry backend (Prometheus + Tempo + Loki + Grafana),
  # collecting the traces/metrics simserver exports. Grafana UI: :3000
  # (anonymous admin). OTLP/gRPC (what simserver speaks): :4317.
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/grafana/agentic-sim-dashboard.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/agentic-sim-dashboard.json:ro
      - ./deploy/grafana/dashboards-provisioning.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro

  adk-agent:
    build: ./examples/adk-agent
    ports:
      - "9001:9001"
    environment:
      - AGENT_NAME=adk_agent
      - MODEL=${ADK_MODEL:-gpt-4o}
      - API_BASE=${API_BASE:-}
      - API_KEY=${API_KEY:-}
      - HOST=adk-agent
      - PORT=9001

  langgraph-agent:
    build: ./examples/langgraph-agent
    ports:
      - "9002:9002"
    environment:
      - AGENT_NAME=langgraph-agent
      - MODEL=${LANGGRAPH_MODEL:-gpt-4o}
      - API_BASE=${API_BASE:-}
      - API_KEY=${API_KEY:-}
      - HOST=langgraph-agent
      - PORT=9002

# API_BASE/API_KEY/{ADK,LANGGRAPH}_MODEL are provider-agnostic: they're
# forwarded as-is to LiteLLM, so the same three knobs work for OpenAI,
# OpenRouter, or a self-hosted OpenAI-compatible server, e.g.:
#
#   # OpenAI directly
#   export API_KEY=sk-...
#
#   # OpenRouter (pick a model slug from https://openrouter.ai/models)
#   export API_KEY=sk-or-...
#   export ADK_MODEL=openrouter/anthropic/claude-3.5-sonnet
#   export LANGGRAPH_MODEL=openrouter/anthropic/claude-3.5-sonnet
#
#   # Self-hosted OpenAI-compatible endpoint (Ollama, vLLM, ...)
#   export API_BASE=http://host.docker.internal:11434/v1
#   export API_KEY=unused
#   export ADK_MODEL=openai/llama3
#
# Start everything:
#   docker compose up -d
#
# Run a simulation with both agents (container-network hostnames, not localhost):
#   curl -X POST localhost:8080/simulate -d '{
#     "duration_ms": 30000, "tick_ms": 1000,
#     "agents": [
#       {"id": "alice", "name": "Alice", "location": "loc_default",
#        "traits": {"friendliness": 7, "curiosity": 3},
#        "goals": ["explore", "trade"], "energy": 100, "credits": 10,
#        "agent_card_url": "http://adk-agent:9001"},
#       {"id": "bob", "name": "Bob", "location": "loc_default",
#        "traits": {"friendliness": 4, "curiosity": 8},
#        "goals": ["gather_info"], "energy": 100, "credits": 5,
#        "agent_card_url": "http://langgraph-agent:9002"}
#     ]
#   }'
